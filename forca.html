<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca · Marco Antonio</title>
    <style>
        body {
            background: #1e1e1e;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .terminal {
            background: #111;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,255,100,0.2);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { margin-top: 0; }
        .forca {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            white-space: pre;
            text-align: left;
            margin: 1rem auto;
            display: inline-block;
            line-height: 1.3;
        }
        .palavra {
            font-size: 2rem;
            letter-spacing: 8px;
            margin: 1rem 0;
        }
        .letras-erradas {
            color: #ff5555;
            min-height: 1.5rem;
        }
        .mensagem {
            font-weight: bold;
            margin: 0.5rem 0;
        }
        button {
            background: #00ff88;
            color: #111;
            border: none;
            padding: 0.6rem 1.5rem;
            font-family: inherit;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 0.3rem;
            font-size: 1rem;
        }
        button:hover { background: #00cc66; }
        .creditos {
            margin-top: 1rem;
            opacity: 0.6;
            font-size: 0.8rem;
        }
        .selecao-idioma p {
            margin-bottom: 0.5rem;
        }
        .erro-carregamento {
            color: #ff5555;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="terminal">
    <h1>Jogo da Forca</h1>

    <div class="selecao-idioma" id="selecao-idioma">
        <p>Escolha o idioma:</p>
        <button id="btn-ptbr">PT-BR</button>
        <button id="btn-ptpt">PT-PT</button>
        <div id="erro-carregamento" class="erro-carregamento" style="display:none;">
            Erro ao carregar palavras. Verifique se o arquivo dados-forca.json está na mesma pasta.
        </div>
    </div>

    <div id="jogo" style="display:none;">
        <div id="forca" class="forca"></div>
        <div id="palavra" class="palavra"></div>
        <div id="erradas" class="letras-erradas"></div>
        <div id="mensagem" class="mensagem"></div>
        <p>Pressione uma tecla (a‑z) para tentar</p>
        <button id="btn-reiniciar">Nova partida</button>
        <button id="btn-trocar">Trocar idioma</button>
    </div>

    <div class="creditos">Desenvolvido por Marco Antonio</div>
</div>

<script>
    (function() {
        // Elementos do DOM
        const selecaoIdioma = document.getElementById('selecao-idioma');
        const jogoDiv = document.getElementById('jogo');
        const forcaDiv = document.getElementById('forca');
        const palavraDiv = document.getElementById('palavra');
        const erradasDiv = document.getElementById('erradas');
        const mensagemDiv = document.getElementById('mensagem');
        const erroCarregamento = document.getElementById('erro-carregamento');

        const btnPtBr = document.getElementById('btn-ptbr');
        const btnPtPt = document.getElementById('btn-ptpt');
        const btnReiniciar = document.getElementById('btn-reiniciar');
        const btnTrocar = document.getElementById('btn-trocar');

        // Variáveis do jogo
        let dados = null;
        let estagiosForca = [];
        let palavrasAtuais = [];
        let palavra = "";
        let acertadas = new Set();
        let erradas = new Set();
        const maxTentativas = 6;
        let jogoAtivo = false;
        let listenerTeclado = null;

        // Carrega o JSON imediatamente
        fetch('dados-forca.json')
            .then(response => {
                if (!response.ok) throw new Error('Arquivo não encontrado');
                return response.json();
            })
            .then(json => {
                dados = json;
                estagiosForca = json.estagiosForca;
                console.log('Palavras carregadas:', json['pt-br'].palavras.length, 'PT-BR,', json['pt-pt'].palavras.length, 'PT-PT');
            })
            .catch(err => {
                console.error('Falha ao carregar dados:', err);
                erroCarregamento.style.display = 'block';
                btnPtBr.disabled = true;
                btnPtPt.disabled = true;
            });

        // Funções auxiliares
        function escolherPalavra() {
            const idx = Math.floor(Math.random() * palavrasAtuais.length);
            return palavrasAtuais[idx].toUpperCase();
        }

        function desenharForca(erros) {
            return estagiosForca[Math.min(erros, estagiosForca.length - 1)];
        }

        function atualizarTela() {
            const erros = erradas.size;
            forcaDiv.textContent = desenharForca(erros);

            const letrasPalavra = palavra.split('').map(l => acertadas.has(l) ? l : '_');
            palavraDiv.textContent = letrasPalavra.join(' ');

            erradasDiv.textContent = erradas.size > 0 ? 'Letras erradas: ' + [...erradas].join(' ') : '';

            if (palavra.split('').every(l => acertadas.has(l))) {
                mensagemDiv.textContent = 'Você venceu! A palavra era: ' + palavra;
                removerOuvinteTeclado();
                jogoAtivo = false;
            } else if (erros >= maxTentativas) {
                mensagemDiv.textContent = 'Você perdeu! A palavra era: ' + palavra;
                removerOuvinteTeclado();
                jogoAtivo = false;
            } else {
                mensagemDiv.textContent = '';
            }
        }

        function lidarTecla(e) {
            if (!jogoAtivo) return;
            if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
                const letra = e.key.toUpperCase();
                if (acertadas.has(letra) || erradas.has(letra)) return;

                if (palavra.includes(letra)) {
                    acertadas.add(letra);
                } else {
                    erradas.add(letra);
                }
                atualizarTela();
            }
        }

        function adicionarOuvinteTeclado() {
            if (listenerTeclado) removerOuvinteTeclado();
            listenerTeclado = lidarTecla;
            document.addEventListener('keydown', listenerTeclado);
        }

        function removerOuvinteTeclado() {
            if (listenerTeclado) {
                document.removeEventListener('keydown', listenerTeclado);
                listenerTeclado = null;
            }
        }

        function reiniciar() {
            if (!palavrasAtuais.length) return;
            palavra = escolherPalavra();
            acertadas.clear();
            erradas.clear();
            jogoAtivo = true;
            atualizarTela();
            adicionarOuvinteTeclado();
        }

        function iniciarJogo(idioma) {
            if (!dados || !dados[idioma]) {
                alert('Dados ainda não carregados. Aguarde um instante.');
                return;
            }
            palavrasAtuais = dados[idioma].palavras;
            selecaoIdioma.style.display = 'none';
            jogoDiv.style.display = 'block';
            reiniciar();
        }

        function voltarIdioma() {
            removerOuvinteTeclado();
            jogoAtivo = false;
            jogoDiv.style.display = 'none';
            selecaoIdioma.style.display = 'block';
            acertadas.clear();
            erradas.clear();
        }

        // Associa os eventos aos botões
        btnPtBr.addEventListener('click', () => iniciarJogo('pt-br'));
        btnPtPt.addEventListener('click', () => iniciarJogo('pt-pt'));
        btnReiniciar.addEventListener('click', reiniciar);
        btnTrocar.addEventListener('click', voltarIdioma);

        // Limpa ouvintes se a aba perder foco (segurança extra)
        window.addEventListener('blur', () => {
            if (jogoAtivo) removerOuvinteTeclado();
        });
        window.addEventListener('focus', () => {
            if (jogoAtivo && !listenerTeclado) adicionarOuvinteTeclado();
        });
    })();
</script>
</body>
</html>
